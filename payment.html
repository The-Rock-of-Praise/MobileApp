<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new window.VConsole();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | The Rock of Praise</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
    <style>
        :root {
            --primary: #ff4d4d;
            --primary-hover: #ff3333;
            --bg-dark: #0a0a0c;
            --card-glass: rgba(20, 20, 25, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #a0a0ab;
            --success: #4ade80;
            --error: #ff4d4d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 77, 77, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(88, 101, 242, 0.08) 0%, transparent 40%),
                #0a0a0c;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Logo Styling */
        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            border-radius: 20px;
            padding: 2px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid rgba(255, 77, 77, 0.2);
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.1);
        }

        .app-logo {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            object-fit: cover;
        }

        .brand-name {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #a0a0ab);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .price-tag {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
            margin: 1.2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .price-tag span {
            font-size: 1rem;
            color: var(--text-dim);
            font-weight: 400;
        }

        .details-box {
            text-align: left;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 18px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .label {
            color: var(--text-dim);
        }

        .value {
            font-weight: 500;
            color: #fff;
        }

        .btn-pay {
            width: 100%;
            padding: 1.1rem;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 8px 24px -6px rgba(255, 77, 77, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-pay:hover:not(:disabled) {
            transform: translateY(-3px);
            background: #d32f2f;
            box-shadow: 0 8px 25px rgba(255, 82, 82, 0.4);
        }

        #status-message {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px;
            border-radius: 10px;
            min-height: 40px;
        }

        .status-error {
            color: var(--error);
            background: rgba(255, 77, 77, 0.1);
        }

        .status-success {
            color: var(--success);
            background: rgba(74, 222, 128, 0.1);
        }

        .card-footer {
            display: block;
            color: #ffffff;
            font-weight: 700;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0.8;
            line-height: 1.5;
        }

        .card-footer strong {
            color: #FFC107;
        }

        .card-footer p {
            margin: 2px 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <p class="brand-name">The Rock of Praise</p>

            <div class="logo-container">
                <img src="/assets/1202.png" id="app-logo" alt="App Logo" class="app-logo"
                    onerror="this.src='https://therockofpraise.org/assets/1202.png'">
            </div>

            <h1>Premium Upgrade</h1>

            <div class="price-tag">$2.99 <span>/ month</span></div>

            <div class="details-box">
                <div class="detail-row">
                    <span class="label">Name</span>
                    <span class="value" id="disp-name">Loading...</span>
                </div>
                <div class="detail-row">
                    <span class="label">Email</span>
                    <span class="value" id="disp-email">Loading...</span>
                </div>
                <div class="detail-row">
                    <span class="label">Plan</span>
                    <span class="value">Premium Subscription</span>
                </div>
            </div>

            <button id="pay-btn" class="btn-pay">Subscribe Now</button>

            <div id="status-message"></div>

            <div class="card-footer">
                <p>Designed & Developed by</p>
                <p class="developer-link">JS Christian Productions</p>
                <p>&copy; 2026 The Rock of Praise. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        const email = urlParams.get('email');
        const name = urlParams.get('name');
        const merchantId = urlParams.get('mid');
        const phone = urlParams.get('phone') || "0771234567";

        document.getElementById('disp-name').textContent = name || 'User';
        document.getElementById('disp-email').textContent = email || 'user@example.com';

        const orderId = "PREMIUM_" + userId + "_" + new Date().getTime();
        const amount = "2.99";
        const currency = "USD";

        // PayHere Callback Handlers
        payhere.onCompleted = function onCompleted(orderId) {
            const msg = document.getElementById('status-message');
            msg.innerHTML = 'Payment Successful! Your subscription is being activated...';
            msg.className = 'status-success';
            setTimeout(() => {
                window.location.href = window.location.origin + '/payment-success';
            }, 3000);
        };

        payhere.onDismissed = function onDismissed() {
            const msg = document.getElementById('status-message');
            msg.innerHTML = 'Payment Cancelled';
            msg.className = 'status-error';
        };

        payhere.onError = function onError(error) {
            const msg = document.getElementById('status-message');
            msg.innerHTML = 'Error: ' + error;
            msg.className = 'status-error';
        };

        document.getElementById('pay-btn').onclick = async function () {
            const btn = this;
            const msg = document.getElementById('status-message');

            if (!merchantId) {
                alert("Merchant ID is missing!");
                return;
            }

            try {
                btn.disabled = true;
                msg.innerHTML = 'Securing payment connection...';

                // 1. Fetch secure hash from backend
                const response = await fetch('/api/payhere/generate-hash', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, amount: amount, currency: currency })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Hash generation server error:', errorText);
                    throw new Error('Server error: ' + response.status);
                }

                const responseText = await response.text();
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    console.error('Failed to parse JSON. Response was:', responseText);
                    throw new Error('Invalid response from server (See console)');
                }

                if (!data.hash) throw new Error('Failed to generate secure hash');

                // 2. Initiate PayHere Payment with Recurring Parameters
                console.log('Initiating payment with Merchant ID:', merchantId);
                console.log('Using generated hash:', data.hash);

                const payment = {
                    "sandbox": false, 
                    "merchant_id": merchantId,
                    "return_url": "https://api.therockofpraise.org/payment-success",
                    "cancel_url": "https://api.therockofpraise.org/payment-cancel",
                    "notify_url": "https://api.therockofpraise.org/api/payhere/notify",
                    "order_id": orderId,
                    "items": "Premium Subscription - Lyrics App",
                    "amount": amount,
                    "currency": currency,
                    "recurrence": "1 Month",
                    "duration": "Forever",
                    "startup_fee": "0.00",
                    "hash": data.hash,
                    "first_name": name ? name.split(' ')[0] : "User",
                    "last_name": (name && name.split(' ').length > 1) ? name.split(' ').slice(1).join(' ') : "User",
                    "email": email || "user@example.com",
                    "phone": phone || "0771234567",
                    "address": "No 1, Main Street",
                    "city": "Colombo",
                    "country": "Sri Lanka",
                    "custom_1": userId,
                    "custom_2": "recurring_premium"
                };

                console.log('Sending this payload to PayHere:', payment);
                payhere.startPayment(payment);
            } catch (err) {
                console.error(err);
                alert("🚨 Payment Error එක: " + err.message);
                msg.innerHTML = 'Payment initiation failed: ' + err.message;
                msg.className = 'status-error';
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
