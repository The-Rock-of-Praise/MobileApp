# Restarting build after manual cancellation
name: Build Mobile App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build Release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --verbose
        continue-on-error: true

      - name: Debug Output directory
        run: |
          echo "Listing build directory:"
          find build -name "*.apk" || echo "No APK found in build/"
          echo "Listing android/app/build directory:"
          find android/app/build -name "*.apk" || echo "No APK found in android/app/build/"

      - name: Move APK if in non-standard location
        run: |
          if [ ! -d "build/app/outputs/flutter-apk" ]; then
            mkdir -p build/app/outputs/flutter-apk
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ] && [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk build/app/outputs/flutter-apk/app-release.apk
            echo "Copied APK from android/app/build to build/app/outputs/flutter-apk"
          fi

      - name: Check for APK existence
        run: |
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
             echo "Error: app-release.apk not found even after fallback check!"
             # Don't fail the whole workflow yet if IPA build might succeed, 
             # but we need to know if this step failed.
             exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Install Cocoapods
        run: cd ios && pod install --repo-update

      - name: Build Release iOS
        run: |
          flutter clean
          flutter pub get
          flutter build ipa --release --no-codesign

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
